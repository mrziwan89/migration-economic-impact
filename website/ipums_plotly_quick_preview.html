<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Immigrant Engine - Migration Outcomes Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #18212f;
      --muted: #5d6b7c;
      --line: #d9e0e7;
      --accent: #116466;
      --warn: #8a5b00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 750;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 760px;
    }

    .pills {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 260px;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: 8px;
      margin: 16px 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    select {
      min-width: 180px;
      max-width: 280px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      font-size: 14px;
    }

    select:focus {
      outline: 2px solid rgba(17, 100, 102, 0.25);
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .full {
      grid-column: 1 / -1;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 19px;
    }

    .status {
      border: 1px solid var(--line);
      background: #fbfcfd;
      color: var(--muted);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status.error {
      border-color: #e7c985;
      color: var(--warn);
      background: #fff8e7;
    }

    .hidden {
      display: none;
    }

    #map,
    #trend,
    #ranking,
    #breakdown {
      width: 100%;
      height: 430px;
    }

    #trend,
    #ranking,
    #breakdown {
      height: 350px;
    }

    @media (max-width: 900px) {
      .wrap {
        padding: 16px;
      }

      header {
        flex-direction: column;
      }

      .pills {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      select {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>

function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        field += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      row.push(field);
      field = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") {
        i += 1;
      }
      row.push(field);
      if (row.some(value => value !== "")) {
        rows.push(row);
      }
      row = [];
      field = "";
    } else {
      field += char;
    }
  }

  if (field.length || row.length) {
    row.push(field);
    if (row.some(value => value !== "")) {
      rows.push(row);
    }
  }

  const headers = rows.shift() || [];
  return rows.map(values => {
    const output = {};
    headers.forEach((header, index) => {
      output[header] = coerceValue(header, values[index] ?? "");
    });
    return output;
  });
}

function coerceValue(key, value) {
  if (value === "") {
    return null;
  }
  const numeric = key === "YEAR" ||
    key === "year_start" ||
    key === "year_end" ||
    key === "STATEFIP" ||
    key === "is_aggregate" ||
    key === "years_observed" ||
    key === "source_rows" ||
    key.includes("weighted_") ||
    key.includes("_value") ||
    key.includes("_rate") ||
    key.includes("_pct") ||
    key.includes("_gap") ||
    key.startsWith("gap_") ||
    key.startsWith("ratio_") ||
    key.includes("_per_100k");
  if (!numeric) {
    return value;
  }
  const number = Number(value);
  return Number.isFinite(number) ? number : null;
}

async function loadCsv(path) {
  const response = await fetch(path);
  if (!response.ok) {
    throw new Error(`Failed to load ${path}: ${response.status}`);
  }
  return parseCsv(await response.text());
}

async function loadAllData() {
  await Promise.all(
    Object.entries(USA_FILES).map(async ([key, path]) => {
      DATA.usa[key] = await loadCsv(path);
    })
  );
  await Promise.all(
    Object.entries(EUROSTAT_FILES).map(async ([key, path]) => {
      DATA.eurostat[key] = await loadCsv(path);
    })
  );
  Object.values(DATA.usa).forEach(rows => rows.forEach(decorateUsaRow));
}

function decorateUsaRow(row) {
  if (!row.state && row.STATEFIP != null) {
    row.state = FIPS_TO_STATE[row.STATEFIP];
  }
  if (!row.state_name && row.state) {
    row.state_name = STATE_NAMES[row.state];
  }
}

function setOptions(select, options, preferredValue) {
  const current = preferredValue ?? select.value;
  select.innerHTML = "";
  options.forEach(option => {
    const element = document.createElement("option");
    element.value = option.value;
    element.textContent = option.label;
    select.appendChild(element);
  });
  if (options.some(option => option.value === current)) {
    select.value = current;
  } else if (options.length) {
    select.value = options[0].value;
  }
}

function uniqueSorted(values) {
  return Array.from(new Set(values.filter(Boolean))).sort((a, b) => String(a).localeCompare(String(b)));
}

function topicOptions(region) {
  const topics = region === "usa" ? USA_TOPICS : EUROSTAT_TOPICS;
  return Object.entries(topics).map(([value, cfg]) => ({value, label: cfg.label}));
}

function configureControls(resetRegion) {
  const region = regionSelect.value;
  const defaults = DEFAULTS[region];

  setOptions(topicSelect, topicOptions(region), resetRegion ? defaults.topic : topicSelect.value);
  const cfg = currentTopicConfig();
  const periods = cfg.periods || PERIODS[region];
  const showEurostatFilters = region === "eurostat" && cfg.usesDemographicFilters;

  document.getElementById("sexControl").classList.toggle("hidden", !showEurostatFilters);
  document.getElementById("ageControl").classList.toggle("hidden", !showEurostatFilters);
  document.getElementById("placeLabel").textContent = region === "usa" ? "Selected state" : "Selected country";

  setOptions(periodSelect, periods.map(value => ({value, label: value})), resetRegion ? defaults.period : periodSelect.value);

  if (showEurostatFilters) {
    const sexOptions = prioritize(uniqueSorted(DATA.eurostat.countryYear.map(row => row.sex)), ["Total", "Females", "Males"]);
    const ageOptions = prioritize(uniqueSorted(DATA.eurostat.countryYear.map(row => row.age)), ["From 15 to 64 years", "From 15 to 59 years", "From 15 to 39 years", "From 15 to 29 years", "From 15 to 24 years"]);
    setOptions(sexSelect, sexOptions.map(value => ({value, label: value})), resetRegion ? defaults.sex : sexSelect.value);
    setOptions(ageSelect, ageOptions.map(value => ({value, label: value})), resetRegion ? defaults.age : ageSelect.value);
  }

  setOptions(placeSelect, placeOptions(region), resetRegion ? defaults.place : placeSelect.value);
}

function prioritize(values, preferred) {
  const preferredSet = new Set(preferred);
  return [
    ...preferred.filter(value => values.includes(value)),
    ...values.filter(value => !preferredSet.has(value))
  ];
}

function placeOptions(region) {
  if (region === "usa") {
    const cfg = USA_TOPICS[topicSelect.value];
    const rows = DATA.usa[cfg.mapKey].filter(row => row.period === periodSelect.value && row.state);
    const byState = new Map(rows.map(row => [row.state, row.state_name || row.state]));
    return Array.from(byState.entries())
      .sort((a, b) => a[1].localeCompare(b[1]))
      .map(([value, label]) => ({value, label: `${value} - ${label}`}));
  }

  const cfg = EUROSTAT_TOPICS[topicSelect.value];
  if (cfg.source === "outcomes") {
    const byCountry = new Map();
    eurostatOutcomeRowsForSelection(cfg, true).forEach(row => {
      if (!row.country_key || byCountry.has(row.country_key)) {
        return;
      }
      byCountry.set(row.country_key, {
        value: row.country_key,
        label: row.is_aggregate ? `${row.country} (aggregate)` : row.country,
        aggregate: row.is_aggregate
      });
    });
    return Array.from(byCountry.values()).sort((a, b) => {
      if (a.aggregate !== b.aggregate) {
        return b.aggregate - a.aggregate;
      }
      return a.label.localeCompare(b.label);
    });
  }

  const rows = eurostatRowsForMap(cfg)
    .concat(DATA.eurostat.countryPeriod.filter(row =>
      row.period === periodSelect.value &&
      row.sex === sexSelect.value &&
      row.age === ageSelect.value &&
      row.is_aggregate === 1
    ));
  const byCountry = new Map();
  rows.forEach(row => {
    if (!row.country_key || byCountry.has(row.country_key)) {
      return;
    }
    byCountry.set(row.country_key, {
      value: row.country_key,
      label: row.is_aggregate ? `${row.country} (aggregate)` : row.country,
      aggregate: row.is_aggregate
    });
  });
  return Array.from(byCountry.values()).sort((a, b) => {
    if (a.aggregate !== b.aggregate) {
      return b.aggregate - a.aggregate;
    }
    return a.label.localeCompare(b.label);
  });
}

function currentTopicConfig() {
  return regionSelect.value === "usa" ? USA_TOPICS[topicSelect.value] : EUROSTAT_TOPICS[topicSelect.value];

function mapScale(values, isGap) {
  const clean = values.filter(value => value != null && Number.isFinite(value));
  if (!clean.length) {
    return {zmin: 0, zmax: 1};
  }
  if (isGap) {
    const maxAbs = Math.max(1, ...clean.map(value => Math.abs(value)));
    return {zmin: -maxAbs, zmax: maxAbs};
  }
  return {zmin: 0, zmax: Math.max(...clean)};
}

function aggregateNational(rows, valueCol, groupCol) {
  const byKey = {};
  rows.forEach(row => {
    if (row.weighted_numerator == null || row.weighted_denominator == null) {
      return;
    }
    const key = groupCol ? `${row.YEAR}|${row[groupCol]}` : `${row.YEAR}`;
    if (!byKey[key]) {
      byKey[key] = {year: row.YEAR, group: groupCol ? row[groupCol] : "", num: 0, den: 0};
    }
    byKey[key].num += row.weighted_numerator;
    byKey[key].den += row.weighted_denominator;
  });
  return Object.values(byKey)
    .map(row => ({
      ...row,
      value: row.den > 0 ? row.num / row.den * (valueCol.includes("per_100k") ? 100000 : 100) : null
    }))
    .sort((a, b) => a.year - b.year);
}

    return `${row.year_start}-${row.year_end}${suffix}`;
  }
  return row.period || "";
}

    paper_bgcolor: "white",
    plot_bgcolor: "white"
  }, {responsive: true});

  document.getElementById("breakdownNote").textContent = "Period values are means across available annual Eurostat observations; suppressed values remain missing.";
}

function trendLayout(title, yTitle) {
  return {
    title,
    yaxis: {title: yTitle, zeroline: true},
    xaxis: {title: "Year", dtick: 1},
    margin: {l: 60, r: 20, t: 45, b: 50},
    paper_bgcolor: "white",
    plot_bgcolor: "white",
    legend: {orientation: "h", y: -0.22}
  };
}

function render() {
  if (!state.ready) {
    return;
  }
  const region = regionSelect.value;
  const cfg = currentTopicConfig();
  if (region === "usa") {
    renderUsa(cfg);
  } else {
    renderEurostat(cfg);
  }
}

function handleRegionChange() {
  configureControls(true);
  render();
}

function handleFilterChange() {
  configureControls(false);
  render();
}

regionSelect.addEventListener("change", handleRegionChange);
topicSelect.addEventListener("change", handleFilterChange);
periodSelect.addEventListener("change", handleFilterChange);
sexSelect.addEventListener("change", handleFilterChange);
ageSelect.addEventListener("change", handleFilterChange);
placeSelect.addEventListener("change", render);

async function init() {
  try {
    await loadAllData();
    state.ready = true;
    configureControls(true);
    statusBox.classList.add("hidden");
    render();
  } catch (error) {
    console.error(error);
    statusBox.classList.add("error");
    statusBox.textContent = "Could not load dashboard data. Serve the website folder over HTTP, then reload this page.";
  }
}

init();
</script>
</body>
</html>
