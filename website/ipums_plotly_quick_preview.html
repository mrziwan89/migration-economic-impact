<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Immigrant Engine - Migration Outcomes Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #18212f;
      --muted: #5d6b7c;
      --line: #d9e0e7;
      --accent: #116466;
      --warn: #8a5b00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 750;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 760px;
    }

    .pills {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 260px;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fbfcfd;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: 8px;
      margin: 16px 0;
    }

    .year-slider-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0 4px;
    }

    .year-slider-panel button {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      font-size: 16px;
      cursor: pointer;
    }

    .year-slider-panel input[type="range"] {
      flex: 1;
      min-width: 150px;
      accent-color: var(--accent);
    }

    .year-slider-panel span {
      min-width: 48px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    select {
      min-width: 180px;
      max-width: 280px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      font-size: 14px;
    }

    select:focus {
      outline: 2px solid rgba(17, 100, 102, 0.25);
      border-color: var(--accent);
    }

    select[multiple] {
      min-height: 140px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .full {
      grid-column: 1 / -1;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 19px;
    }

    .status {
      border: 1px solid var(--line);
      background: #fbfcfd;
      color: var(--muted);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status.error {
      border-color: #e7c985;
      color: var(--warn);
      background: #fff8e7;
    }

    .hidden {
      display: none;
    }

    #map,
    #trend,
    #ranking,
    #breakdown {
      width: 100%;
      height: 430px;
    }

    #trend,
    #ranking,
    #breakdown {
      height: 350px;
    }

    @media (max-width: 900px) {
      .wrap {
        padding: 16px;
      }

      header {
        flex-direction: column;
      }

      .pills {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      select {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>

function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        field += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      row.push(field);
      field = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") {
        i += 1;
      }
      row.push(field);
      if (row.some(value => value !== "")) {
        rows.push(row);
      }
      row = [];
      field = "";
    } else {
      field += char;
    }
  }

  if (field.length || row.length) {
    row.push(field);
    if (row.some(value => value !== "")) {
      rows.push(row);
    }
  }

  const headers = rows.shift() || [];
  return rows.map(values => {
    const output = {};
    headers.forEach((header, index) => {
      output[header] = coerceValue(header, values[index] ?? "");
    });
    return output;
  });
}

function coerceValue(key, value) {
  if (value === "") {
    return null;
  }
  const numeric = key === "YEAR" ||
    key === "year_start" ||
    key === "year_end" ||
    key === "STATEFIP" ||
    key === "is_aggregate" ||
    key === "years_observed" ||
    key === "source_rows" ||
    key.includes("weighted_") ||
    key.includes("_value") ||
    key.includes("_rate") ||
    key.includes("_pct") ||
    key.includes("_gap") ||
    key.startsWith("gap_") ||
    key.startsWith("ratio_") ||
    key.includes("_per_100k");
  if (!numeric) {
    return value;
  }
  const number = Number(value);
  return Number.isFinite(number) ? number : null;
}

async function loadCsv(path) {
  const response = await fetch(path);
  if (!response.ok) {
    throw new Error(`Failed to load ${path}: ${response.status}`);
  }
  return parseCsv(await response.text());
}

async function loadAllData() {
  await Promise.all(
    Object.entries(USA_FILES).map(async ([key, path]) => {
      DATA.usa[key] = await loadCsv(path);
    })
  );
  await Promise.all(
    Object.entries(EUROSTAT_FILES).map(async ([key, path]) => {
      DATA.eurostat[key] = await loadCsv(path);
    })
  );
  Object.values(DATA.usa).forEach(rows => rows.forEach(decorateUsaRow));
}

function decorateUsaRow(row) {
  if (!row.state && row.STATEFIP != null) {
    row.state = FIPS_TO_STATE[row.STATEFIP];
  }
  if (!row.state_name && row.state) {
    row.state_name = STATE_NAMES[row.state];
  }
}

function setOptions(select, options, preferredValue) {
  const current = preferredValue != null
    ? preferredValue
    : select.multiple
      ? Array.from(select.selectedOptions).map(option => option.value)
      : select.value;
  const preferred = Array.isArray(current) ? current : [current];
  select.innerHTML = "";

  options.forEach(option => {
    const element = document.createElement("option");
    element.value = option.value;
    element.textContent = option.label;
    if (select.multiple) {
      element.selected = preferred.includes(option.value);
    }
    select.appendChild(element);
  });

  if (select.multiple) {
    if (!select.selectedOptions.length && options.length) {
      select.options[0].selected = true;
    }
  } else if (options.some(option => option.value === preferred[0])) {
    select.value = preferred[0];
  } else if (options.length) {
    select.value = options[0].value;
  }
}

function uniqueSorted(values) {
  return Array.from(new Set(values.filter(Boolean))).sort((a, b) => String(a).localeCompare(String(b)));
}

function topicOptions(region) {
  const topics = region === "usa" ? USA_TOPICS : EUROSTAT_TOPICS;
  return Object.entries(topics).map(([value, cfg]) => ({value, label: cfg.label}));
}

function configureControls(resetRegion) {
  const region = regionSelect.value;
  const defaults = DEFAULTS[region];

  setOptions(topicSelect, topicOptions(region), resetRegion ? defaults.topic : topicSelect.value);
  const cfg = currentTopicConfig();
  const showEurostatFilters = region === "eurostat" && cfg.usesDemographicFilters;

  document.getElementById("sexControl").classList.toggle("hidden", !showEurostatFilters);
  document.getElementById("ageControl").classList.toggle("hidden", !showEurostatFilters);
  document.getElementById("placeLabel").textContent = region === "usa" ? "Selected state" : "Selected country";

  if (showEurostatFilters) {
    const sexOptions = prioritize(uniqueSorted(DATA.eurostat.countryYear.map(row => row.sex)), ["Total", "Females", "Males"]);
    const ageOptions = prioritize(uniqueSorted(DATA.eurostat.countryYear.map(row => row.age)), ["From 15 to 64 years", "From 15 to 59 years", "From 15 to 39 years", "From 15 to 29 years", "From 15 to 24 years"]);
    setOptions(sexSelect, sexOptions.map(value => ({value, label: value})), resetRegion ? defaults.sex : sexSelect.value);
    setOptions(ageSelect, ageOptions.map(value => ({value, label: value})), resetRegion ? defaults.age : ageSelect.value);
  }

  setOptions(placeSelect, placeOptions(region), resetRegion ? [defaults.place] : getSelectedPlaces());
}

function getSelectedPlaces() {
  return Array.from(placeSelect.selectedOptions).map(option => option.value).slice(0, 5);
}

function getSelectedPlaceLabels() {
  return Array.from(placeSelect.selectedOptions).map(option => option.label).slice(0, 5);
}

function ensureMaxSelectedPlaces() {
  const selected = Array.from(placeSelect.selectedOptions);
  if (selected.length <= 5) {
    return;
  }
  selected.slice(5).forEach(option => {
    option.selected = false;
  });
  statusBox.classList.remove("hidden");
  statusBox.textContent = "Select up to 5 states or countries.";
  setTimeout(() => {
    if (!statusBox.classList.contains("error")) {
      statusBox.classList.add("hidden");
    }
  }, 2500);
}

function getSelectedYear() {
  const year = Number(yearSlider.value);
  return Number.isFinite(year) ? year : null;
}

function availableYearsForTopic(region, cfg) {
  let rows;
  if (region === "usa") {
    rows = DATA.usa[cfg.trendKey].filter(row => row[cfg.trendValue] != null);
  } else if (cfg.source === "outcomes") {
    rows = DATA.eurostat.outcomeYear.filter(row =>
      row.metric_key === cfg.metricKey && row[cfg.value] != null && row.is_aggregate === 0
    );
  } else if (cfg.kind === "gap") {
    rows = DATA.eurostat.gapYear.filter(row =>
      row.comparison_group === cfg.comparisonGroup && row[cfg.value] != null && row.is_aggregate === 0
    );
  } else {
    rows = DATA.eurostat.countryYear.filter(row =>
      row.citizen_group === cfg.citizenGroup && row[cfg.value] != null && row.is_aggregate === 0
    );
  }

  const years = Array.from(new Set(rows.map(row => row.YEAR).filter(value => value != null))).map(Number);
  years.sort((a, b) => a - b);
  return years;
}

function updateYearSlider(cfg) {
  const years = availableYearsForTopic(regionSelect.value, cfg);
  if (!years.length) {
    yearSlider.disabled = true;
    yearSlider.min = 0;
    yearSlider.max = 0;
    yearSlider.value = 0;
    yearValue.textContent = "—";
    return;
  }

  yearSlider.disabled = false;
  yearSlider.min = years[0];
  yearSlider.max = years[years.length - 1];
  yearSlider.step = 1;

  const currentYear = Number(yearSlider.value);
  if (!years.includes(currentYear)) {
    yearSlider.value = years[years.length - 1];
  }

  yearValue.textContent = yearSlider.value;
}

function stopYearAnimation() {
  if (!yearAnimation) {
    return;
  }
  clearInterval(yearAnimation);
  yearAnimation = null;
  playButton.textContent = "▶";
}

function startYearAnimation() {
  if (yearAnimation) {
    return;
  }
  playButton.textContent = "❚❚";
  yearAnimation = setInterval(() => {
    const min = Number(yearSlider.min);
    const max = Number(yearSlider.max);
    const next = Number(yearSlider.value) + 1;
    yearSlider.value = next > max ? min : next;
    yearValue.textContent = yearSlider.value;
    render();
  }, 800);
}

function toggleYearAnimation() {
  if (yearAnimation) {
    stopYearAnimation();
  } else {
    startYearAnimation();
  }
}

function prioritize(values, preferred) {
  const preferredSet = new Set(preferred);
  return [
    ...preferred.filter(value => values.includes(value)),
    ...values.filter(value => !preferredSet.has(value))
  ];
}

function placeOptions(region) {
  const selectedYear = getSelectedYear();

  if (region === "usa") {
    const cfg = USA_TOPICS[topicSelect.value];
    const rows = DATA.usa[cfg.trendKey].filter(row => row.YEAR === selectedYear && row.state);
    const byState = new Map(rows.map(row => [row.state, row.state_name || row.state]));
    return Array.from(byState.entries())
      .sort((a, b) => a[1].localeCompare(b[1]))
      .map(([value, label]) => ({value, label: `${value} - ${label}`}));
  }

  const cfg = EUROSTAT_TOPICS[topicSelect.value];
  if (cfg.source === "outcomes") {
    const sourceRows = selectedYear
      ? eurostatOutcomeRowsForSelection(cfg, true, selectedYear)
      : eurostatOutcomeRowsForSelection(cfg, true);
    const byCountry = new Map();
    sourceRows.forEach(row => {
      if (!row.country_key || byCountry.has(row.country_key)) {
        return;
      }
      byCountry.set(row.country_key, {
        value: row.country_key,
        label: row.is_aggregate ? `${row.country} (aggregate)` : row.country,
        aggregate: row.is_aggregate
      });
    });
    return Array.from(byCountry.values()).sort((a, b) => {
      if (a.aggregate !== b.aggregate) {
        return b.aggregate - a.aggregate;
      }
      return a.label.localeCompare(b.label);
    });
  }

  const rows = selectedYear
    ? eurostatRowsForMap(cfg, selectedYear)
    : eurostatRowsForMap(cfg);
  const byCountry = new Map();
  rows.forEach(row => {
    if (!row.country_key || byCountry.has(row.country_key)) {
      return;
    }
    byCountry.set(row.country_key, {
      value: row.country_key,
      label: row.is_aggregate ? `${row.country} (aggregate)` : row.country,
      aggregate: row.is_aggregate
    });
  });
  return Array.from(byCountry.values()).sort((a, b) => {
    if (a.aggregate !== b.aggregate) {
      return b.aggregate - a.aggregate;
    }
    return a.label.localeCompare(b.label);
  });
}

function currentTopicConfig() {
  return regionSelect.value === "usa" ? USA_TOPICS[topicSelect.value] : EUROSTAT_TOPICS[topicSelect.value];
}

function usaYearRows(cfg, year) {
  const rows = DATA.usa[cfg.trendKey].filter(row => row.YEAR === year && row.state);
  if (cfg.isGap) {
    const grouped = new Map();
    rows.forEach(row => {
      if (!grouped.has(row.state)) {
        grouped.set(row.state, {state: row.state, state_name: row.state_name, foreign: null, us: null});
      }
      const entry = grouped.get(row.state);
      if (row.nativity_group === "Foreign-born") {
        entry.foreign = row[cfg.trendValue];
      } else if (row.nativity_group === "US-born") {
        entry.us = row[cfg.trendValue];
      }
    });
    return Array.from(grouped.values()).map(row => ({
      state: row.state,
      state_name: row.state_name,
      value: row.foreign != null && row.us != null ? row.foreign - row.us : null,
      foreign: row.foreign,
      us: row.us
    }));
  }
  return rows.map(row => ({
    state: row.state,
    state_name: row.state_name,
    value: row[cfg.trendValue]
  }));
}

function eurostatYearRows(cfg, year) {
  if (cfg.source === "outcomes") {
    return DATA.eurostat.outcomeYear.filter(row => row.YEAR === year && row.metric_key === cfg.metricKey && row[cfg.value] != null);
  }
  if (cfg.kind === "gap") {
    return DATA.eurostat.gapYear.filter(row => row.YEAR === year && row.sex === sexSelect.value && row.age === ageSelect.value && row.comparison_group === cfg.comparisonGroup && row.iso3);
  }
  return DATA.eurostat.countryYear.filter(row => row.YEAR === year && row.sex === sexSelect.value && row.age === ageSelect.value && row.citizen_group === cfg.citizenGroup && row.iso3);
}

function addYearMarker(layout, year) {
  const selectedYear = year != null ? year : getSelectedYear();
  if (selectedYear != null) {
    layout.shapes = layout.shapes || [];
    layout.shapes.push({
      type: "line",
      x0: selectedYear,
      x1: selectedYear,
      y0: 0,
      y1: 1,
      xref: "x",
      yref: "paper",
      line: {color: "#c44536", width: 1, dash: "dash"}
    });
  }
}

function blankPlot(id, title, message) {
  Plotly.newPlot(id, [], {
    title,
    annotations: [{
      text: message,
      xref: "paper",
      yref: "paper",
      x: 0.5,
      y: 0.5,
      showarrow: false,
      font: {color: "#5d6b7c"}
    }],
    xaxis: {visible: false},
    yaxis: {visible: false},
    margin: {l: 20, r: 20, t: 45, b: 20},
    paper_bgcolor: "white",
    plot_bgcolor: "white"
  }, {responsive: true});
}

function mapScale(values, isGap) {
  const clean = values.filter(value => value != null && Number.isFinite(value));
  if (!clean.length) {
    return {zmin: 0, zmax: 1};
  }
  if (isGap) {
    const maxAbs = Math.max(1, ...clean.map(value => Math.abs(value)));
    return {zmin: -maxAbs, zmax: maxAbs};
  }
  return {zmin: 0, zmax: Math.max(...clean)};
}

function getUsaGapLabels(cfg) {
  return cfg.gapLabels || {top: "Higher value", bottom: "Lower value"};
}

function getEUGapLabels(cfg) {
  return cfg.gapLabels || {top: "Higher value", bottom: "Lower value"};
}

function getColorScaleArray(name) {
  const scales = {
    Blues: ["#f7fbff", "#deebf7", "#c6dbef", "#9ecae1", "#6baed6", "#4292c6", "#2171b5", "#08519c", "#08306b"],
    RdBu: ["#67001f", "#b2182b", "#d6604d", "#f4a582", "#fddbc7", "#d1e5f0", "#92c5de", "#4393c3", "#2166ac"],
    YlOrRd: ["#ffffcc", "#ffeda0", "#fed976", "#feb24c", "#fd8d3c", "#fc4e2a", "#e31a1c", "#bd0026", "#800026"],
    YlGnBu: ["#ffffcc", "#c7e9b4", "#7fcdbb", "#41b6c4", "#1d91c0", "#225ea8", "#253494", "#081d58"]
  };
  return scales[name] || scales.Blues;
}

function getEurostatDisplayUnits(cfg) {
  if (!cfg) return "";
  return cfg.units || "";
}

function visualEurostatValue(cfg, value) {
  if (value == null || !Number.isFinite(value)) {
    return null;
  }
  return value;
}

function getValueColor(value, scale, colorscale = "Blues") {
  if (value == null || !Number.isFinite(value)) {
    return "#d3d3d3";
  }
  const stops = getColorScaleArray(colorscale);
  const span = Math.max(1e-9, scale.zmax - scale.zmin);
  const normalized = Math.max(0, Math.min(1, (value - scale.zmin) / span));
  const index = Math.min(stops.length - 1, Math.floor(normalized * (stops.length - 1)));
  return stops[index];
}

function getColorbarTickvals(scale) {
  if (!scale) return [];
  const zmin = Number(scale.zmin || 0);
  const zmax = Number(scale.zmax || 0);
  if (zmax === zmin) {
    // ensure two distinct tick positions so ticktext is rendered
    const eps = Math.abs(zmax) < 1 ? 1e-6 : Math.abs(zmax) * 1e-6;
    return [zmax, zmin + eps];
  }
  return [zmax, zmin];
}

function getStableScale(cfg, region) {
  return region === "usa" ? getStableUsaScale(cfg) : getStableEurostatScale(cfg);
}

function getStableUsaScale(cfg) {
  const years = Array.from(new Set(DATA.usa[cfg.trendKey].map(row => row.YEAR)));
  const values = years.flatMap(year => usaYearRows(cfg, year).map(row => row.value));
  return mapScale(values, cfg.isGap);
}

function getStableEurostatScale(cfg) {
  let rows = [];
  if (cfg.source === "outcomes") {
    rows = DATA.eurostat.outcomeYear.filter(row => row.metric_key === cfg.metricKey && row[cfg.value] != null);
  } else if (cfg.kind === "gap") {
    rows = DATA.eurostat.gapYear.filter(row =>
      row.sex === sexSelect.value &&
      row.age === ageSelect.value &&
      row.comparison_group === cfg.comparisonGroup &&
      row[cfg.value] != null
    );
  } else {
    rows = DATA.eurostat.countryYear.filter(row =>
      row.sex === sexSelect.value &&
      row.age === ageSelect.value &&
      row.citizen_group === cfg.citizenGroup &&
      row[cfg.value] != null
    );
  }
  return mapScale(rows.map(row => row[cfg.value]), cfg.kind === "gap" || cfg.isGap);
}

function aggregateNational(rows, valueCol, groupCol) {
  const byKey = {};
  rows.forEach(row => {
    if (row.weighted_numerator == null || row.weighted_denominator == null) {
      return;
    }
    const key = groupCol ? `${row.YEAR}|${row[groupCol]}` : `${row.YEAR}`;
    if (!byKey[key]) {
      byKey[key] = {year: row.YEAR, group: groupCol ? row[groupCol] : "", num: 0, den: 0};
    }
    byKey[key].num += row.weighted_numerator;
    byKey[key].den += row.weighted_denominator;
  });
  return Object.values(byKey)
    .map(row => ({
      ...row,
      value: row.den > 0 ? row.num / row.den * (valueCol.includes("per_100k") ? 100000 : 100) : null
    }))
    .sort((a, b) => a.year - b.year);
}

function renderUsa(cfg) {
  const selectedYear = getSelectedYear();
  const selectedPlaces = new Set(getSelectedPlaces());
  const primaryPlace = Array.from(selectedPlaces)[0] || (placeSelect.options[0] && placeSelect.options[0].value);
  const mapRows = selectedYear
    ? usaYearRows(cfg, selectedYear).filter(row => row.state)
    : DATA.usa[cfg.mapKey].filter(row => row.state);
  const values = mapRows.map(row => row.value);
  const scale = getStableScale(cfg, "usa");
  const selectedRows = selectedPlaces.size
    ? mapRows.filter(row => selectedPlaces.has(row.state))
    : [];

  if (!mapRows.length) {
    blankPlot("map", cfg.title, "No state data available for this selection.");
  } else {
    const baseTrace = {
      type: "choropleth",
      locationmode: "USA-states",
      locations: mapRows.map(row => row.state),
      z: values,
      text: mapRows.map(row => row.state_name),
      customdata: mapRows.map(row => [row.foreign, row.us]),
      colorscale: cfg.colorscale || (cfg.isGap ? "RdBu" : "Blues"),
      reversescale: cfg.isGap ? false : false,
      zmin: scale.zmin,
      zmax: scale.zmax,
      opacity: selectedPlaces.size ? 0.32 : 1,
      marker: {line: {color: "white", width: 0.7}},
      colorbar: cfg.isGap ? {
        title: cfg.units,
        tickvals: getColorbarTickvals(scale),
        ticktext: [getUsaGapLabels(cfg).top, getUsaGapLabels(cfg).bottom],
        len: 0.75
      } : {title: cfg.units},
      hovertemplate: cfg.isGap
        ? "<b>%{text}</b><br>Gap: %{z:.1f} " + cfg.units + "<br>Foreign-born: %{customdata[0]:.1f}%<br>US-born: %{customdata[1]:.1f}%<extra></extra>"
        : "<b>%{text}</b><br>Rate: %{z:.1f}%<extra></extra>"
    };
    const traces = [baseTrace];

    if (selectedRows.length) {
      traces.push({
        type: "choropleth",
        locationmode: "USA-states",
        locations: selectedRows.map(row => row.state),
        z: selectedRows.map(row => row.value),
        text: selectedRows.map(row => row.state_name),
        customdata: selectedRows.map(row => [row.foreign, row.us]),
        colorscale: cfg.colorscale || (cfg.isGap ? "RdBu" : "Blues"),
        reversescale: cfg.isGap ? false : false,
        zmin: scale.zmin,
        zmax: scale.zmax,
        opacity: 1,
        marker: {line: {color: "white", width: 1}},
        showscale: false,
        hovertemplate: cfg.isGap
          ? "<b>%{text}</b><br>Gap: %{z:.1f} " + cfg.units + "<br>Foreign-born: %{customdata[0]:.1f}%<br>US-born: %{customdata[1]:.1f}%<extra></extra>"
          : "<b>%{text}</b><br>Rate: %{z:.1f}%<extra></extra>"
      });
    }

    Plotly.newPlot("map", traces, {
      title: `${cfg.title} - ${selectedYear}`,
      geo: {scope: "usa", projection: {type: "albers usa"}},
      margin: {l: 0, r: 0, t: 45, b: 0},
      paper_bgcolor: "white",
      plot_bgcolor: "white"
    }, {responsive: true});
  }

  renderUsaRanking(cfg, mapRows, selectedYear, selectedPlaces);
  renderUsaTrend(cfg, selectedPlaces, selectedYear);
  renderUsaBreakdown(cfg, selectedYear, primaryPlace, selectedYear);
  document.getElementById("mapNote").textContent = `${cfg.note} ${selectedYear ? `Selected year: ${selectedYear}.` : ""}`;
  document.getElementById("rankingNote").textContent = cfg.isGap
    ? `Ranking uses the selected ${selectedYear ? "year" : "period"}. Positive gaps mean the foreign-born rate is higher than the US-born rate.`
    : `Ranking uses the selected ${selectedYear ? "year" : "period"}.`;
  renderRadarComparison("usa", cfg, selectedPlaces, selectedYear);
}

function renderUsaRanking(cfg, rows, periodOrYear, selectedPlaces) {
  const allRows = rows
    .filter(row => (row[cfg.value] ?? row.value) != null)
    .sort((a, b) => (b[cfg.value] ?? b.value) - (a[cfg.value] ?? a.value));
  const topRows = allRows.slice(0, 10);
  const extraRows = selectedPlaces.size > 0
    ? allRows.filter(row => selectedPlaces.has(row.state) && !topRows.includes(row)).slice(0, 5)
    : [];
  const rankingRows = [...topRows, ...extraRows].reverse();

  if (!rankingRows.length) {
    blankPlot("ranking", "State ranking", "No ranking data available.");
    return;
  }

  const opacities = rankingRows.map(row => selectedPlaces.has(row.state) ? 1 : 0.28);

  Plotly.newPlot("ranking", [{
    type: "bar",
    orientation: "h",
    y: rankingRows.map(row => row.state),
    x: rankingRows.map(row => row[cfg.value] ?? row.value),
    text: rankingRows.map(row => row.state_name),
    marker: {color: "#116466", opacity: opacities},
    hovertemplate: "<b>%{text}</b><br>%{x:.1f} " + cfg.units + "<extra></extra>"
  }], {
    title: `Highest states - ${cfg.title} - ${periodOrYear}`,
    xaxis: {title: cfg.units, zeroline: true},
    yaxis: {title: ""},
    margin: {l: 60, r: 20, t: 45, b: 50},
    paper_bgcolor: "white",
    plot_bgcolor: "white"
  }, {responsive: true});
}

function renderUsaTrend(cfg, selectedPlaces, selectedYear) {
  const rows = DATA.usa[cfg.trendKey];

  if (!rows.length) {
    blankPlot("trend", cfg.title, "No trend data available.");
    return;
  }

  const layout = trendLayout(`${cfg.title} over time`, cfg.units);
  addYearMarker(layout);
  const placeList = Array.from(selectedPlaces);
  const stateLineColors = ["#c44536", "#2a6f97", "#8a2be2", "#ff8c00", "#2e8b57"];

  if (!cfg.isGap && topicSelect.value === "lang") {
    const national = aggregateNational(rows, cfg.trendValue, null);
    const traces = [{
      type: "scatter",
      mode: "lines+markers",
      name: "National",
      x: national.map(row => row.year),
      y: national.map(row => row.value),
      line: {color: "#116466"}
    }];

    placeList.forEach((place, index) => {
      const stateRows = rows.filter(row => row.state === place).sort((a, b) => a.YEAR - b.YEAR);
      if (!stateRows.length) {
        return;
      }
      traces.push({
        type: "scatter",
        mode: "lines+markers",
        name: `${STATE_NAMES[place] || place}`,
        x: stateRows.map(row => row.YEAR),
        y: stateRows.map(row => row[cfg.trendValue]),
        line: {color: stateLineColors[index % stateLineColors.length], dash: "dot"}
      });
    });

    Plotly.newPlot("trend", traces, layout, {responsive: true});
  } else {
    const national = aggregateNational(rows, cfg.trendValue, "nativity_group");
    const traces = ["Foreign-born", "US-born"].map((group, index) => {
      const groupRows = national.filter(row => row.group === group);
      return {
        type: "scatter",
        mode: "lines+markers",
        name: `National ${group}`,
        x: groupRows.map(row => row.year),
        y: groupRows.map(row => row.value),
        line: {color: index === 0 ? "#116466" : "#6f7f8f"}
      };
    });

    placeList.forEach((place, placeIndex) => {
      const stateRows = rows.filter(row => row.state === place).sort((a, b) => a.YEAR - b.YEAR);
      ["Foreign-born", "US-born"].forEach((group, index) => {
        const groupRows = stateRows.filter(row => row.nativity_group === group);
        if (!groupRows.length) {
          return;
        }
        traces.push({
          type: "scatter",
          mode: "lines",
          name: `${STATE_NAMES[place] || place} ${group}`,
          x: groupRows.map(row => row.YEAR),
          y: groupRows.map(row => row[cfg.trendValue]),
          line: {dash: "dot", color: stateLineColors[(placeIndex * 2 + index) % stateLineColors.length]}
        });
      });
    });

    Plotly.newPlot("trend", traces, layout, {responsive: true});
  }

  document.getElementById("trendNote").textContent = selectedYear
    ? `Solid lines show national trends; dotted lines show the selected state(s). Highlighted year: ${selectedYear}.`
    : "Solid lines show national trends; dotted lines show the selected state(s).";
}

function renderUsaBreakdown(cfg, period, place, selectedYear) {
  if (topicSelect.value === "health") {
    const rows = selectedYear
      ? []
      : DATA.usa.healthCitPeriod
        .filter(row => row.period === period && row.state === place)
        .sort((a, b) => b.uninsured_rate_pct - a.uninsured_rate_pct);

    if (selectedYear || !rows.length) {
      blankPlot("breakdown", "Healthcare access by citizenship", "Detailed citizenship breakdown is only available for period-pooled data.");
      document.getElementById("breakdownNote").textContent = "Healthcare citizenship detail is not available for year-level selection.";
      return;
    }

    Plotly.newPlot("breakdown", [{
      type: "bar",
      x: rows.map(row => row.citizenship_group),
      y: rows.map(row => row.uninsured_rate_pct),
      marker: {color: "#c44536"},
      hovertemplate: "%{x}<br>Uninsured: %{y:.1f}%<extra></extra>"
    }], {
      title: `Healthcare access by citizenship - ${place}, ${period}`,
      yaxis: {title: "% uninsured"},
      xaxis: {title: ""},
      margin: {l: 60, r: 20, t: 45, b: 120},
      paper_bgcolor: "white",
      plot_bgcolor: "white"
    }, {responsive: true});
    document.getElementById("breakdownNote").textContent = "Healthcare citizenship detail comes from the period-pooled ACS/IPUMS aggregate file.";
    return;
  }

  let row;
  if (selectedYear) {
    const rows = DATA.usa[cfg.trendKey].filter(item => item.YEAR === selectedYear && item.state === place);
    if (cfg.isGap) {
      const foreign = rows.find(item => item.nativity_group === "Foreign-born");
      const us = rows.find(item => item.nativity_group === "US-born");
      row = {
        foreign: foreign ? foreign[cfg.trendValue] : null,
        us: us ? us[cfg.trendValue] : null
      };
    } else {
      row = rows[0] || {};
    }
  } else {
    row = DATA.usa[cfg.mapKey].find(item => item.period === period && item.state === place);
  }

  if (!row || (cfg.isGap && row.foreign == null && row.us == null)) {
    blankPlot("breakdown", "Selected state detail", "No detail data available.");
    return;
  }

  if (cfg.isGap) {
    Plotly.newPlot("breakdown", [{
      type: "bar",
      x: ["Foreign-born", "US-born"],
      y: [row.foreign, row.us],
      marker: {color: ["#116466", "#6f7f8f"]},
      hovertemplate: "%{x}<br>%{y:.1f}<extra></extra>"
    }], {
      title: `${cfg.title} components - ${place}, ${period}`,
      yaxis: {title: cfg.units.replace("percentage points", "%")},
      xaxis: {title: ""},
      margin: {l: 60, r: 20, t: 45, b: 60},
      paper_bgcolor: "white",
      plot_bgcolor: "white"
    }, {responsive: true});
    document.getElementById("breakdownNote").textContent = "The gap is foreign-born rate minus US-born rate.";
  } else {
    const nationalRows = selectedYear
      ? DATA.usa[cfg.trendKey].filter(item => item.YEAR === selectedYear)
      : DATA.usa[cfg.mapKey].filter(item => item.period === period);
    const national = aggregateNational(nationalRows, cfg.trendValue, null)[0];
    Plotly.newPlot("breakdown", [{
      type: "bar",
      x: [place, "National"],
      y: [row[cfg.trendValue], national ? national.value : null],
      marker: {color: ["#116466", "#6f7f8f"]},
      hovertemplate: "%{x}<br>%{y:.1f}%<extra></extra>"
    }], {
      title: `${cfg.title} detail - ${place}, ${period}`,
      yaxis: {title: "%"},
      xaxis: {title: ""},
      margin: {l: 60, r: 20, t: 45, b: 60},
      paper_bgcolor: "white",
      plot_bgcolor: "white"
    }, {responsive: true});
    document.getElementById("breakdownNote").textContent = "National comparison is weighted from the selected dataset.";
  }
}

function eurostatRowsForMap(cfg, year = null) {
  if (year == null) {
    year = getSelectedYear();
  }

  if (year != null) {
    if (cfg.source === "outcomes") {
      return DATA.eurostat.outcomeYear.filter(row =>
        row.YEAR === year &&
        row.metric_key === cfg.metricKey &&
        row[cfg.value] != null &&
        row.iso3
      );
    }
    if (cfg.kind === "gap") {
      return DATA.eurostat.gapYear.filter(row =>
        row.YEAR === year &&
        row.sex === sexSelect.value &&
        row.age === ageSelect.value &&
        row.comparison_group === cfg.comparisonGroup &&
        row.iso3
      );
    }
    return DATA.eurostat.countryYear.filter(row =>
      row.YEAR === year &&
      row.sex === sexSelect.value &&
      row.age === ageSelect.value &&
      row.citizen_group === cfg.citizenGroup &&
      row.iso3
    );
  }

  return [];
}

function eurostatOutcomeRowsForSelection(cfg, includeAggregates = false, year = null) {
  if (year == null) {
    year = getSelectedYear();
  }
  if (year != null) {
    return DATA.eurostat.outcomeYear.filter(row =>
      row.YEAR === year &&
      row.metric_key === cfg.metricKey &&
      row[cfg.value] != null &&
      (includeAggregates || (row.is_aggregate === 0 && row.iso3))
    );
  }
  return DATA.eurostat.outcomeLatest.filter(row =>
    row.metric_key === cfg.metricKey &&
    row[cfg.value] != null &&
    (includeAggregates || (row.is_aggregate === 0 && row.iso3))
  );
}

function outcomeCoverageLabel(row) {
  if (row.YEAR != null) {
    return String(row.YEAR);
  }
  if (row.year_start != null && row.year_end != null) {
    const suffix = row.years_observed ? `, ${row.years_observed} observed year${row.years_observed === 1 ? "" : "s"}` : "";
    return `${row.year_start}-${row.year_end}${suffix}`;
  }
  return row.period || "";
}

function renderEurostatOutcome(cfg) {
  const selectedYear = getSelectedYear();
  const selectedPlaces = new Set(getSelectedPlaces());
  const primaryPlace = Array.from(selectedPlaces)[0] || (placeSelect.options[0] && placeSelect.options[0].value);

    : "<b>%{text}</b><br>Gap: %{z:.1f} percentage points<br>Extra-EU migrant: %{customdata[2]:.1f}%<br>EU migrant: %{customdata[1]:.1f}%<br>Native-born: %{customdata[0]:.1f}%<br>Coverage: %{customdata[3]}<extra></extra>";

  if (!rows.length) {

      type: "choropleth",
      locationmode: "ISO-3",
      locations: rows.map(row => row.iso3),
      z: values,
      text: rows.map(row => row.country),
      customdata: rows.map(row => [row.native_value, row.eu_migrant_value, row.extra_eu_migrant_value, outcomeCoverageLabel(row)]),

      colorbar: cfg.isGap ? {

    }], {

  renderEurostatOutcomeRanking(cfg, rows, periodOrYear, selectedPlaces);

function renderEurostatOutcomeRanking(cfg, rows, periodOrYear, selectedPlaces) {
  const allRows = rows
    .filter(row => row[cfg.value] != null)
    .sort((a, b) => cfg.rankDirection === "ascending" ? visualEurostatValue(cfg, a[cfg.value]) - visualEurostatValue(cfg, b[cfg.value]) : visualEurostatValue(cfg, b[cfg.value]) - visualEurostatValue(cfg, a[cfg.value]));
  const topRows = allRows.slice(0, 12);
  const extraRows = selectedPlaces.size > 0
    ? allRows.filter(row => selectedPlaces.has(row.country_key) && !topRows.includes(row)).slice(0, 5)
    : [];
  const rankingRows = [...topRows, ...extraRows].reverse();

  if (!rankingRows.length) {
    blankPlot("ranking", "Country ranking", "No ranking data available.");
    return;
  }

  const opacities = rankingRows.map(row => selectedPlaces.has(row.country_key) ? 1 : 0.32);
  Plotly.newPlot("ranking", [{
    type: "bar",
    orientation: "h",
    y: rankingRows.map(row => row.country),
    x: rankingRows.map(row => visualEurostatValue(cfg, row[cfg.value])),
    customdata: rankingRows.map(row => outcomeCoverageLabel(row)),
    marker: {color: "#116466", opacity: opacities},
    hovertemplate: "<b>%{y}</b><br>%{x:.1f} " + getEurostatDisplayUnits(cfg) + "<br>%{customdata}<extra></extra>"
  }], {
    title: `${cfg.rankDirection === "ascending" ? "Largest disadvantages" : "Highest countries"} - ${cfg.title} - ${periodOrYear}`,
    xaxis: {title: getEurostatDisplayUnits(cfg), zeroline: true},
    yaxis: {title: ""},
    margin: {l: 135, r: 20, t: 45, b: 50},
    paper_bgcolor: "white",
    plot_bgcolor: "white"
  }, {responsive: true});
}

function renderEurostatOutcomeTrend(cfg, place, selectedYear) {
  const selectedRows = DATA.eurostat.outcomeYear
    .filter(row => row.country_key === place && row.metric_key === cfg.metricKey && row[cfg.value] != null)
    .sort((a, b) => a.YEAR - b.YEAR);
  const euRows = DATA.eurostat.outcomeYear
    .filter(row => row.country_code === "EU" && row.metric_key === cfg.metricKey && row[cfg.value] != null)
    .sort((a, b) => a.YEAR - b.YEAR);
  const traces = [];
  const layout = trendLayout(`${cfg.title} over time`, getEurostatDisplayUnits(cfg));
  addYearMarker(layout, selectedYear);

  if (selectedRows.length) {
    traces.push({
      type: "scatter",
      mode: "lines+markers",
      name: selectedRows[0].country,
      x: selectedRows.map(row => row.YEAR),
      y: selectedRows.map(row => visualEurostatValue(cfg, row[cfg.value])),
      line: {color: "#116466"}
    });
  }
  if (place !== "EU" && euRows.length) {
    traces.push({
      type: "scatter",
      mode: "lines+markers",
      name: "EU aggregate",
      x: euRows.map(row => row.YEAR),
      y: euRows.map(row => visualEurostatValue(cfg, row[cfg.value])),
      line: {dash: "dot", color: "#c44536"}
    });

    ? `Trend uses annual rows from the normalized EU outcomes file. Highlighted year: ${selectedYear}.`
    : "Trend uses annual rows from the normalized EU outcomes file.";

function renderEurostatOutcomeBreakdown(cfg, place, selectedYear) {

  }], {

  }, {responsive: true});

function buildRadarSeries(region, cfg, place, selectedYear) {
  if (region === "usa") {
    const rows = DATA.usa[cfg.trendKey].filter(row => row.state === place && row.YEAR === selectedYear);
    if (!rows.length) {
      return null;
    }
    if (cfg.isGap) {
      const foreign = rows.find(r => r.nativity_group === "Foreign-born");
      const us = rows.find(r => r.nativity_group === "US-born");
      return foreign && us ? foreign[cfg.trendValue] - us[cfg.trendValue] : null;
    }
    const row = rows.find(r => r.nativity_group == null) || rows[0];
    return row ? row[cfg.trendValue] : null;
  }

  if (cfg.source === "outcomes") {
    const row = DATA.eurostat.outcomeYear.find(r => r.YEAR === selectedYear && r.metric_key === cfg.metricKey && r.country_key === place);
    return row ? row[cfg.value] : null;
  }

  if (cfg.kind === "gap") {
    const row = DATA.eurostat.gapYear.find(r =>
      r.YEAR === selectedYear &&
      r.country_key === place &&
      r.sex === sexSelect.value &&
      r.age === ageSelect.value &&
      r.comparison_group === cfg.comparisonGroup
    );
    return row ? row[cfg.value] : null;
  }

  const row = DATA.eurostat.countryYear.find(r =>
    r.YEAR === selectedYear &&
    r.country_key === place &&
    r.sex === sexSelect.value &&
    r.age === ageSelect.value &&
    r.citizen_group === cfg.citizenGroup
  );
  return row ? row[cfg.value] : null;
}

function renderRadarComparison(region, cfg, selectedPlaces, selectedYear) {
  const allTopics = region === "usa" ? Object.values(USA_TOPICS) : Object.values(EUROSTAT_TOPICS);
  const placeList = Array.from(selectedPlaces);
  const availableTopics = allTopics.filter(topic =>
    placeList.some(place => buildRadarSeries(region, topic, place, selectedYear) != null)
  );
  const labels = availableTopics.map(topic => topic.label);
  const radarColors = ["#c44536", "#2a6f97", "#8a2be2", "#ff8c00", "#2e8b57"];
  const traces = placeList.map((place, index) => ({
    type: "scatterpolar",
    r: availableTopics.map(topic => visualEurostatValue(topic, buildRadarSeries(region, topic, place, selectedYear))),
    theta: labels,
    fill: "toself",
    name: place,
    line: {color: radarColors[index % radarColors.length]}
  })).filter(trace => trace.r.some(value => value != null));

  if (!traces.length) {
    blankPlot("radar", "Topic comparison", "Select up to 5 states or countries to compare.");
    document.getElementById("radarNote").textContent = "Radar comparison updates for the selected places and year.";
    return;
  }

  Plotly.newPlot("radar", traces, {
    title: "Topic comparison",
    polar: {
      radialaxis: {visible: true, tickfont: {size: 10}},
      angularaxis: {tickfont: {size: 11}}
    },
    margin: {l: 60, r: 20, t: 45, b: 80},
    paper_bgcolor: "white",
    plot_bgcolor: "white",
    legend: {orientation: "h", y: -0.22}
  }, {responsive: true});

  document.getElementById("radarNote").textContent = `Comparison across ${labels.length} topics for the selected places.`;
}

function renderEurostatTrend(cfg, selectedPlaces, selectedYear) {
  // Normalize selectedPlaces to an array: accept Array, Set, or single-string
  let selPlaces;
  if (Array.isArray(selectedPlaces)) {
    selPlaces = selectedPlaces;
  } else if (selectedPlaces instanceof Set) {
    selPlaces = Array.from(selectedPlaces);
  } else if (selectedPlaces == null) {
    selPlaces = [];
  } else {
    selPlaces = [selectedPlaces];
  }
  const places = selPlaces.length ? selPlaces : [placeSelect.options[0] && placeSelect.options[0].value].filter(Boolean);
  const sex = sexSelect.value;
  const age = ageSelect.value;
  let traces = [];
  const layout = trendLayout(`${cfg.title} over time`, getEurostatDisplayUnits(cfg));
  addYearMarker(layout, selectedYear);

  if (cfg.kind === "gap") {
    places.forEach((place, index) => {
      const selectedRows = DATA.eurostat.gapYear
        .filter(row => row.country_key === place && row.sex === sex && row.age === age && row.comparison_group === cfg.comparisonGroup)
        .sort((a, b) => a.YEAR - b.YEAR);
      if (selectedRows.length) {
        traces.push({
          type: "scatter",
          mode: "lines+markers",
          name: selectedRows[0].country,
          x: selectedRows.map(row => row.YEAR),
          y: selectedRows.map(row => visualEurostatValue(cfg, row.employment_rate_gap_pp)),
          line: {color: ["#116466", "#c44536", "#6f7f8f", "#8a6d3b", "#2e8b57"][index % 5]}
        });
      }
    });

    const euRows = DATA.eurostat.gapYear
      .filter(row => row.country_key === "EU27_2020" && row.sex === sex && row.age === age && row.comparison_group === cfg.comparisonGroup)
      .sort((a, b) => a.YEAR - b.YEAR);
    if (places.length && euRows.length) {
      traces.push({
        type: "scatter",
        mode: "lines+markers",
        name: "EU27 aggregate",
        x: euRows.map(row => row.YEAR),
        y: euRows.map(row => visualEurostatValue(cfg, row.employment_rate_gap_pp)),
        line: {dash: "dot", color: "#c44536"}
      });
    }
  } else {
    places.forEach((place, index) => {
      const placeRows = DATA.eurostat.countryYear
        .filter(row => row.country_key === place && row.sex === sex && row.age === age && row.citizen_group === cfg.citizenGroup)
        .sort((a, b) => a.YEAR - b.YEAR);
      if (!placeRows.length) {
        return;
      }
      traces.push({
        type: "scatter",
        mode: "lines+markers",
        name: placeRows[0].country,
        x: placeRows.map(row => row.YEAR),
        y: placeRows.map(row => visualEurostatValue(cfg, row.employment_rate_pct)),
        line: {color: ["#116466", "#c44536", "#6f7f8f", "#8a6d3b", "#2e8b57"][index % 5]}
      });
    });
  }

  if (!traces.length) {
    blankPlot("trend", `${cfg.title} over time`, "No trend data available for the selected country.");
  } else {
    Plotly.newPlot("trend", traces, layout, {responsive: true});
  }

  document.getElementById("trendNote").textContent = cfg.kind === "gap"
    ? "Trend compares the selected country with the EU27 aggregate when both are available."
    : "Trend shows available citizenship groups for the selected country.";
}

function renderEurostatBreakdown(period, place, selectedYear) {

}

function render() {
  if (!state.ready) {
    return;
  }
  const region = regionSelect.value;
  const cfg = currentTopicConfig();
  if (region === "usa") {
    renderUsa(cfg);
  } else {
    renderEurostat(cfg);
  }
}

function handleRegionChange() {
  stopYearAnimation();
  configureControls(true);
  updateYearSlider(currentTopicConfig());
  render();
}

function handleFilterChange() {
  stopYearAnimation();
  configureControls(false);
  updateYearSlider(currentTopicConfig());
  render();
}

function handlePlaceChange() {
  ensureMaxSelectedPlaces();
  render();
}

yearSlider.addEventListener("input", () => {
  yearValue.textContent = yearSlider.value;
  render();
});

playButton.addEventListener("click", toggleYearAnimation);

regionSelect.addEventListener("change", handleRegionChange);
topicSelect.addEventListener("change", handleFilterChange);
sexSelect.addEventListener("change", handleFilterChange);
ageSelect.addEventListener("change", handleFilterChange);
placeSelect.addEventListener("change", handlePlaceChange);

async function init() {
  try {
    await loadAllData();
    state.ready = true;
    configureControls(true);
    updateYearSlider(currentTopicConfig());
    statusBox.classList.add("hidden");
    render();
  } catch (error) {
    console.error(error);
    statusBox.classList.add("error");
    statusBox.textContent = "Could not load dashboard data. Serve the website folder over HTTP, then reload this page.";
  }
}

init();
</script>
</body>
</html>
